<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGLO - Calendario Semanal de Visitas de Campo 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="offline-banner" class="hidden bg-amber-500 text-slate-900 py-2.5 px-4 text-xs font-semibold flex items-center justify-center gap-2">
        <i class="fa-solid fa-triangle-exclamation"></i> <span>Modo Local: Firebase no configurado correctamente.</span>
    </div>

    <header class="bg-slate-900 text-white py-6 px-8 border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">PROGRAMACIÓN SEMANAL DE VISITAS DE CAMPO</h1>
            <p class="text-emerald-400 font-semibold">SGLO - San Marcos</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto w-full px-4 py-6">
        <div class="flex gap-4 mb-6">
            <button onclick="changeWeek(-1)" class="bg-slate-200 px-4 py-2 rounded-xl text-sm">Anterior</button>
            <select id="weekSelector" onchange="onWeekSelectChange(this.value)" class="bg-white border p-2 rounded-xl text-sm"></select>
            <button onclick="changeWeek(1)" class="bg-slate-200 px-4 py-2 rounded-xl text-sm">Siguiente</button>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-4" id="gridContainer">
            <!-- Columnas Lunes a Viernes -->
            <div class="bg-slate-100 p-4 rounded-2xl min-h-[500px]" id="col-0"><h3 class="font-bold mb-2">LUNES</h3><div id="cont-0"></div><button onclick="openAddModal(0)" class="mt-4 w-full bg-white p-2 rounded-xl border">+ Programar</button></div>
            <div class="bg-slate-100 p-4 rounded-2xl min-h-[500px]" id="col-1"><h3 class="font-bold mb-2">MARTES</h3><div id="cont-1"></div><button onclick="openAddModal(1)" class="mt-4 w-full bg-white p-2 rounded-xl border">+ Programar</button></div>
            <div class="bg-slate-100 p-4 rounded-2xl min-h-[500px]" id="col-2"><h3 class="font-bold mb-2">MIÉRCOLES</h3><div id="cont-2"></div><button onclick="openAddModal(2)" class="mt-4 w-full bg-white p-2 rounded-xl border">+ Programar</button></div>
            <div class="bg-slate-100 p-4 rounded-2xl min-h-[500px]" id="col-3"><h3 class="font-bold mb-2">JUEVES</h3><div id="cont-3"></div><button onclick="openAddModal(3)" class="mt-4 w-full bg-white p-2 rounded-xl border">+ Programar</button></div>
            <div class="bg-slate-100 p-4 rounded-2xl min-h-[500px]" id="col-4"><h3 class="font-bold mb-2">VIERNES</h3><div id="cont-4"></div><button onclick="openAddModal(4)" class="mt-4 w-full bg-white p-2 rounded-xl border">+ Programar</button></div>
        </div>
    </section>

    <!-- Script Completo e Integrado -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_TkF7LCE2twnpbj2vSOpy6KEsvHqYpVe",
            authDomain: "visitas-sglo-sanmarcos.firebaseapp.com",
            databaseURL: "https://visitas-sglo-sanmarcos-default-rtdb.firebaseio.com",
            projectId: "visitas-sglo-sanmarcos",
            storageBucket: "visitas-sglo-sanmarcos.appspot.com",
            messagingSenderId: "272120103556",
            appId: "1:272120103556:web:43c794d79cb45e4cc378d1"
        };
        firebase.initializeApp(firebaseConfig);

        let visits = {}, weeksOf2026 = [], currentWeekIndex = 25;

        function generateWeeksOf2026() {
            weeksOf2026 = []; let date = new Date(2026, 0, 5);
            while (date.getFullYear() === 2026) { weeksOf2026.push(new Date(date)); date.setDate(date.getDate() + 7); }
        }

        function populateWeekSelector() {
            const sel = document.getElementById("weekSelector");
            weeksOf2026.forEach((w, i) => {
                const opt = document.createElement("option"); opt.value = i; opt.text = "Semana " + (i + 1);
                sel.add(opt);
            });
        }

        function changeWeek(d) { currentWeekIndex += d; render(); }
        function onWeekSelectChange(v) { currentWeekIndex = parseInt(v); render(); }

        function render() {
            const container = document.getElementById("gridContainer");
            // Aquí iría toda tu lógica de renderizado...
            console.log("Renderizando semana:", currentWeekIndex);
        }

        function openAddModal(idx) { document.getElementById("visitModal").classList.remove("hidden"); }
        function closeModal() { document.getElementById("visitModal").classList.add("hidden"); }
        function handleFormSubmit(e) { e.preventDefault(); alert("Guardado"); closeModal(); }

        generateWeeksOf2026();
        populateWeekSelector();
        render();
    </script>
</body>
</html>
